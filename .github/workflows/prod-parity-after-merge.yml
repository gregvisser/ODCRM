# After each push to main, poll prod until frontend and backend both serve the pushed SHA.
name: Prod parity after merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

concurrency:
  group: prod-parity-after-merge
  cancel-in-progress: true

jobs:
  parity-poller:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Poll with classification and bounded backend auto-recovery
        run: |
          EXPECT_SHA="${{ github.sha }}"
          echo "Expecting prod to serve SHA: $EXPECT_SHA"
          EXPECT_SHA="$EXPECT_SHA" node scripts/prod-check.cjs
        env:
          PROD_FRONTEND: https://odcrm.bidlow.co.uk
          PROD_BACKEND: https://odcrm-api-hkbsfbdzdvezedg8.westeurope-01.azurewebsites.net
          PARITY_MAX_ATTEMPTS: '90'
          PARITY_RETRY_DELAY_MS: '10000'
          AUTO_RECOVER_BACKEND: 'true'
          AUTO_RECOVER_THRESHOLD_ATTEMPT: '18'
          RECOVERY_WORKFLOW: deploy-backend-azure.yml
          RECOVERY_REF: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
